<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#F6F1E7" />
  <title>CTM · Carte Tarif Millésime</title>

  <!-- Icônes / PWA -->
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="manifest" href="./manifest.json">

  <!-- Fonts Google : Fraunces (serif) + Manrope (sans) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap">

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 + Babel via CDN (pas de build nécessaire) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body, #root { min-height: 100vh; }
    body {
      margin: 0;
      background: #F6F1E7;
      font-family: Manrope, -apple-system, system-ui, sans-serif;
      color: #1A1613;
      -webkit-tap-highlight-color: transparent;
    }
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
    }
    /* Empêche le zoom sur iOS quand focus sur input */
    input, select, textarea { font-size: 16px; }
  </style>
</head>
<body>
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Fraunces,serif;color:#6B5E54;font-size:18px;">
      Chargement de CTM…
    </div>
  </div>

  <script type="text/babel" data-presets="react">
// ==================== HOOKS & REACT GLOBALS ====================
const { useState, useEffect, useMemo } = React;

// Version de l'app (à incrémenter à chaque mise à jour de l'index.html)
const APP_VERSION = '1.1.0';

// ==================== ICÔNES (SVG Lucide inline) ====================
const IconPaths = {
  home: 'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10',
  wine: 'M8 22h8 M7 10h10 M12 15v7 M12 15a5 5 0 0 0 5-5V3H7v7a5 5 0 0 0 5 5Z',
  truck: 'M14 18V6a2 2 0 0 0-2-2H2v13h2 M15 18H9 M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14v10h1 M7 18a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z M17 18a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z',
  file: 'M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z M14 2v6h6 M9 13h6 M9 17h3',
  bell: 'M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9 M10.3 21a1.94 1.94 0 0 0 3.4 0',
  plus: 'M5 12h14 M12 5v14',
  search: 'm21 21-4.3-4.3 M10 18a7 7 0 1 0 0-14 7 7 0 0 0 0 14Z',
  filter: 'M22 3H2l8 9.46V19l4 2v-8.54z',
  chevronRight: 'm9 18 6-6-6-6',
  chevronDown: 'm6 9 6 6 6-6',
  x: 'M18 6 6 18 M6 6l12 12',
  edit: 'M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z',
  trash: 'M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6 m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2',
  copy: 'M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2 M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Z',
  printer: 'M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2 M6 9V2h12v7 M6 14h12v8H6z',
  alertCircle: 'M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10Z M12 8v4 M12 16h.01',
  checkCircle: 'M21.801 10A10 10 0 1 1 17 3.335 m22 4L12 14.01l-3-3',
  mapPin: 'M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0Z M12 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z',
  arrowLeft: 'm12 19-7-7 7-7 M19 12H5',
  eye: 'M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0Z M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z',
  upload: 'M12 3v12 m21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 m17 8-5-5-5 5',
  menu: 'M4 6h16 M4 12h16 M4 18h16',
  check: 'M20 6 9 17l-5-5',
  save: 'M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7 M7 3v4a1 1 0 0 0 1 1h7',
};

function Icon({ name, size = 16, className = '', strokeWidth = 1.75, style = {} }) {
  const d = IconPaths[name];
  if (!d) return null;
  // Les paths multiples sont séparés par " m " ou " M " — on split sur " M " au début d'un path
  // Plus simple : on split par " M " qui apparaît en milieu de chaîne (après un autre path)
  const parts = d.split(/ (?=M )/);
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
         fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round"
         strokeLinejoin="round" className={className} style={style}>
      {parts.map((p, i) => <path key={i} d={p} />)}
    </svg>
  );
}

// ==================== CONSTANTES ====================
const FORMATS_VERRE = ['6 cl', '12 cl'];
const FORMATS_BOUTEILLE = [
  { code: '1/2 BTL', label: '1/2 Bouteille' },
  { code: 'BTL', label: 'Bouteille' },
  { code: 'MAG', label: 'Magnum' },
  { code: 'JERO', label: 'Jéroboam' },
  { code: 'MATHU', label: 'Mathusalem' },
  { code: 'NABU', label: 'Nabuchodonosor' },
];
const COULEURS = ['Champagne', 'Blanc', 'Rosé', 'Rouge', 'Vin Doux', 'Saké'];
const REGIONS = ['Bourgogne', 'Provence', 'Loire', 'Rhône', 'Languedoc-Roussillon', 'Bordeaux', 'Beaujolais', 'Corse', 'Alsace', 'Champagne', 'Étrangers', 'Japon'];

// ==================== STOCKAGE (localStorage wrapper) ====================
const storage = {
  get(key) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch (e) { return null; }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); return true; }
    catch (e) { console.warn('Storage full:', e); return false; }
  },
};

// ==================== UTILS ====================
const formatEuro = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n);
};
const calcCoef = (paHt, pvpTtc, tva = 0.20) => (!paHt || !pvpTtc) ? null : (pvpTtc / (1 + tva)) / paHt;
const calcMarge = (paHt, pvpTtc, tva = 0.20) => {
  if (!paHt || !pvpTtc) return null;
  const pvpHt = pvpTtc / (1 + tva);
  return (pvpHt - paHt) / pvpHt;
};
const formatNomProduit = (p) => {
  const suffix = [];
  if (p.parcelle) suffix.push(`« ${p.parcelle} »`);
  if (p.cuvee) suffix.push(p.cuvee);
  const ligne1 = suffix.length > 0 ? `${p.appellation} ${suffix.join(', ')}` : p.appellation;
  return { ligne1, ligne2: p.domaine || '' };
};

// ==================== DESIGN TOKENS ====================
const tokens = {
  bg: '#F6F1E7', bgCard: '#FFFDF7', bgAlt: '#EFE8D9',
  ink: '#1A1613', inkSoft: '#6B5E54', inkFaint: '#A39486',
  border: '#E2D7C2', accent: '#722F37', accentSoft: '#9C4A52',
  gold: '#9C7C3B', green: '#3D5A40', red: '#B4432C',
};
const fontDisplay = { fontFamily: 'Fraunces, Georgia, serif' };
const fontBody = { fontFamily: 'Manrope, -apple-system, sans-serif' };

// ==================== UI PRIMITIVES ====================
function Badge({ children, variant = 'neutral' }) {
  const variants = {
    neutral: { bg: tokens.bgAlt, fg: tokens.inkSoft },
    draft: { bg: '#F3E8CA', fg: '#8A6B1F' },
    validated: { bg: '#D8E5D4', fg: tokens.green },
  };
  const v = variants[variant] || variants.neutral;
  return <span style={{ ...fontBody, backgroundColor: v.bg, color: v.fg }} className="inline-flex items-center px-2 py-0.5 text-[11px] font-medium rounded-full uppercase tracking-wider">{children}</span>;
}
function Button({ children, variant = 'primary', onClick, icon, disabled, className = '', size = 'md' }) {
  const styles = {
    primary: { bg: tokens.ink, fg: tokens.bg, hover: '#000' },
    secondary: { bg: tokens.bgAlt, fg: tokens.ink, hover: tokens.border },
    ghost: { bg: 'transparent', fg: tokens.inkSoft, hover: tokens.bgAlt },
    accent: { bg: tokens.accent, fg: '#fff', hover: tokens.accentSoft },
  };
  const s = styles[variant];
  const sizes = { sm: 'px-2.5 py-1.5 text-xs', md: 'px-4 py-2 text-sm' };
  return (
    <button onClick={onClick} disabled={disabled}
      style={{ ...fontBody, backgroundColor: s.bg, color: s.fg }}
      className={`inline-flex items-center gap-2 ${sizes[size]} rounded-lg font-medium transition-colors disabled:opacity-40 disabled:cursor-not-allowed ${className}`}
      onMouseEnter={(e) => !disabled && (e.currentTarget.style.backgroundColor = s.hover)}
      onMouseLeave={(e) => !disabled && (e.currentTarget.style.backgroundColor = s.bg)}>
      {icon && <Icon name={icon} size={size === 'sm' ? 14 : 16} />}
      {children}
    </button>
  );
}
function Card({ children, className = '', onClick }) {
  return <div onClick={onClick} style={{ backgroundColor: tokens.bgCard, borderColor: tokens.border }} className={`border rounded-xl ${onClick ? 'cursor-pointer hover:shadow-sm transition-shadow' : ''} ${className}`}>{children}</div>;
}
function Input({ value, onChange, placeholder, type = 'text', icon, disabled }) {
  return (
    <div className="relative">
      {icon && <span className="absolute left-3 top-1/2 -translate-y-1/2" style={{ color: tokens.inkFaint }}><Icon name={icon} size={16} /></span>}
      <input type={type} value={value ?? ''} disabled={disabled}
        onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
        style={{ ...fontBody, backgroundColor: tokens.bgCard, borderColor: tokens.border, color: tokens.ink }}
        className={`w-full border rounded-lg py-2 ${icon ? 'pl-9' : 'pl-3'} pr-3 text-sm focus:outline-none disabled:opacity-50`} />
    </div>
  );
}
function Select({ value, onChange, options, placeholder }) {
  return (
    <select value={value ?? ''} onChange={(e) => onChange(e.target.value || null)}
      style={{ ...fontBody, backgroundColor: tokens.bgCard, borderColor: tokens.border, color: tokens.ink }}
      className="w-full border rounded-lg py-2 px-3 text-sm focus:outline-none">
      <option value="">{placeholder || 'Tous'}</option>
      {options.map((o) => <option key={o} value={o}>{o}</option>)}
    </select>
  );
}
function Toggle({ checked, onChange, label }) {
  return (
    <label className="flex items-center gap-2 cursor-pointer select-none">
      <div onClick={() => onChange(!checked)}
        style={{ backgroundColor: checked ? tokens.accent : tokens.border }}
        className="relative w-9 h-5 rounded-full transition-colors">
        <div style={{ backgroundColor: '#fff', transform: checked ? 'translateX(16px)' : 'translateX(2px)' }}
          className="absolute top-0.5 w-4 h-4 rounded-full transition-transform shadow" />
      </div>
      <span style={{ ...fontBody, color: tokens.ink }} className="text-sm">{label}</span>
    </label>
  );
}
function Label({ children }) {
  return <label style={{ ...fontBody, color: tokens.inkSoft }} className="text-[10px] uppercase tracking-wider block mb-1 font-medium">{children}</label>;
}

// ==================== MODAL ÉDITION PRODUIT ====================
function ProduitEditModal({ produit, fournisseurs, onSave, onClose, user, onRequestCreation }) {
  const isNew = !produit;
  const [service, setService] = useState(produit?.service || 'Bouteille');
  const [couleur, setCouleur] = useState(produit?.couleur || 'Rouge');
  const [region, setRegion] = useState(produit?.region || '');
  const [sousRegion, setSousRegion] = useState(produit?.sousRegion || '');
  const [appellation, setAppellation] = useState(produit?.appellation || '');
  const [domaine, setDomaine] = useState(produit?.domaine || '');
  const [hasParcelle, setHasParcelle] = useState(!!produit?.parcelle);
  const [parcelle, setParcelle] = useState(produit?.parcelle || '');
  const [hasCuvee, setHasCuvee] = useState(!!produit?.cuvee);
  const [cuvee, setCuvee] = useState(produit?.cuvee || '');
  const [millesime, setMillesime] = useState(produit?.millesime || '');
  const [format, setFormat] = useState(produit?.format || (service === 'Au Verre' ? '12 cl' : 'BTL'));
  const [paHt, setPaHt] = useState(produit?.paHt || '');
  const [fournisseur, setFournisseur] = useState(produit?.fournisseur || '');

  useEffect(() => {
    if (service === 'Au Verre' && !FORMATS_VERRE.includes(format)) setFormat('12 cl');
    if (service === 'Bouteille' && FORMATS_VERRE.includes(format)) setFormat('BTL');
  }, [service]);

  const canSubmit = appellation.trim() && domaine.trim() && format && paHt;
  const handleSave = () => {
    const p = {
      id: produit?.id || `p${Date.now()}${Math.random().toString(36).slice(2, 6)}`,
      service, couleur,
      region: region || null, sousRegion: sousRegion || null,
      appellation: appellation.trim(), domaine: domaine.trim(),
      parcelle: hasParcelle && parcelle.trim() ? parcelle.trim() : null,
      cuvee: hasCuvee && cuvee.trim() ? cuvee.trim() : null,
      millesime: millesime || null, format,
      paHt: parseFloat(paHt), fournisseur: fournisseur || null,
    };
    if (isNew && user.role === 'editeur') onRequestCreation(p);
    else onSave(p);
  };

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-end lg:items-center justify-center p-0 lg:p-4">
      <div style={{ backgroundColor: tokens.bg }} className="w-full lg:max-w-2xl lg:rounded-xl max-h-[95vh] flex flex-col">
        <div style={{ borderColor: tokens.border }} className="border-b p-4 flex items-center justify-between">
          <h2 style={{ ...fontDisplay, color: tokens.ink }} className="text-xl font-semibold">
            {isNew ? 'Nouveau produit' : 'Modifier le produit'}
          </h2>
          <button onClick={onClose}><Icon name="x" size={22} style={{ color: tokens.ink }} /></button>
        </div>
        <div className="flex-1 overflow-y-auto p-4 space-y-4">
          <div>
            <Label>Service</Label>
            <div className="grid grid-cols-2 gap-2">
              {['Au Verre', 'Bouteille'].map((s) => (
                <button key={s} onClick={() => setService(s)}
                  style={{ ...fontBody, backgroundColor: service === s ? tokens.ink : tokens.bgCard, color: service === s ? tokens.bg : tokens.ink, borderColor: tokens.border }}
                  className="border rounded-lg py-2 text-sm font-medium transition-colors">{s}</button>
              ))}
            </div>
          </div>
          <div>
            <Label>Couleur</Label>
            <div className="grid grid-cols-3 gap-2">
              {COULEURS.map((c) => (
                <button key={c} onClick={() => setCouleur(c)}
                  style={{ ...fontBody, backgroundColor: couleur === c ? tokens.ink : tokens.bgCard, color: couleur === c ? tokens.bg : tokens.ink, borderColor: tokens.border }}
                  className="border rounded-lg py-2 text-sm transition-colors">{c}</button>
              ))}
            </div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div><Label>Région</Label><Select value={region} onChange={(v) => setRegion(v || '')} options={REGIONS} placeholder="Aucune" /></div>
            <div><Label>Sous-région</Label><Input value={sousRegion} onChange={setSousRegion} placeholder="ex: Côte de Beaune" /></div>
          </div>
          <div><Label>Appellation *</Label><Input value={appellation} onChange={setAppellation} placeholder="ex: Pommard 1er Cru" /></div>
          <div><Label>Domaine / Producteur *</Label><Input value={domaine} onChange={setDomaine} placeholder="ex: Domaine Georges Joillot" /></div>
          <div style={{ backgroundColor: tokens.bgCard, borderColor: tokens.border }} className="border rounded-lg p-3">
            <Toggle checked={hasParcelle} onChange={setHasParcelle} label="Ce vin a une parcelle / lieu-dit" />
            {hasParcelle && <div className="mt-2"><Input value={parcelle} onChange={setParcelle} placeholder='ex: Les Charmots' /></div>}
          </div>
          <div style={{ backgroundColor: tokens.bgCard, borderColor: tokens.border }} className="border rounded-lg p-3">
            <Toggle checked={hasCuvee} onChange={setHasCuvee} label="Ce vin a une cuvée nommée" />
            {hasCuvee && <div className="mt-2"><Input value={cuvee} onChange={setCuvee} placeholder="ex: Cuvée Frisson d'Avril" /></div>}
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <Label>Format *</Label>
              <select value={format} onChange={(e) => setFormat(e.target.value)}
                style={{ ...fontBody, backgroundColor: tokens.bgCard, borderColor: tokens.border, color: tokens.ink }}
                className="w-full border rounded-lg py-2 px-3 text-sm focus:outline-none">
                {service === 'Au Verre'
                  ? FORMATS_VERRE.map((f) => <option key={f} value={f}>{f}</option>)
                  : FORMATS_BOUTEILLE.map((f) => <option key={f.code} value={f.code}>{f.label} ({f.code})</option>)}
              </select>
            </div>
            <div><Label>Millésime</Label><Input value={millesime} onChange={setMillesime} placeholder="ex: 2022 ou NM" /></div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div><Label>Prix d'achat HT *</Label><Input value={paHt} onChange={setPaHt} type="number" placeholder="ex: 28.06" /></div>
            <div><Label>Fournisseur</Label><Select value={fournisseur} onChange={(v) => setFournisseur(v || '')} options={fournisseurs} placeholder="Sélectionner" /></div>
          </div>
          <div style={{ backgroundColor: tokens.bgAlt, borderColor: tokens.border }} className="border rounded-lg p-3">
            <Label>Aperçu sur la carte</Label>
            <div style={{ ...fontDisplay, color: tokens.ink }} className="font-semibold">
              {formatNomProduit({ appellation: appellation || '...', parcelle: hasParcelle ? parcelle : null, cuvee: hasCuvee ? cuvee : null }).ligne1}
            </div>
            <div style={{ ...fontBody, color: tokens.inkSoft }} className="text-sm">
              {domaine || '...'}{millesime && ` — ${millesime}`}{format && ` · ${format}`}
            </div>
          </div>
          {isNew && user.role === 'editeur' && (
            <div style={{ backgroundColor: '#F3E8CA', borderColor: '#E5D59C' }} className="border rounded-lg p-3">
              <p style={{ ...fontBody, color: '#8A6B1F' }} className="text-xs">
                <span style={{ display: 'inline-block', verticalAlign: 'middle', marginRight: 4 }}><Icon name="alertCircle" size={12} /></span>
                Votre demande sera envoyée à Victor pour validation.
              </p>
            </div>
          )}
        </div>
        <div style={{ borderColor: tokens.border, backgroundColor: tokens.bgCard }} className="border-t p-4 flex justify-end gap-2">
          <Button variant="ghost" onClick={onClose}>Annuler</Button>
          <Button variant="primary" icon="save" onClick={handleSave} disabled={!canSubmit}>
            {isNew ? (user.role === 'editeur' ? 'Envoyer la demande' : 'Créer') : 'Enregistrer'}
          </Button>
        </div>
      </div>
    </div>
  );
}

// ==================== HEADER / SIDEBAR ====================
function Header({ user, onUserChange, onToggleSidebar, utilisateurs }) {
  return (
    <header style={{ backgroundColor: tokens.bgCard, borderColor: tokens.border }} className="border-b px-4 lg:px-8 py-3 flex items-center justify-between sticky top-0 z-30">
      <div className="flex items-center gap-3">
        <button className="lg:hidden" onClick={onToggleSidebar}>
          <Icon name="menu" size={22} style={{ color: tokens.ink }} />
        </button>
        <img src="./icon-192.png" alt="CTM" width="36" height="36"
             style={{ width: 36, height: 36, borderRadius: 8, objectFit: 'cover' }} />
        <div className="flex items-baseline gap-2">
          <span style={{ ...fontDisplay, color: tokens.ink }} className="text-2xl font-semibold tracking-tight">CTM</span>
          <span style={{ ...fontBody, color: tokens.inkFaint }} className="hidden sm:inline text-xs tracking-widest uppercase">Carte · Tarif · Millésime</span>
        </div>
      </div>
      <select value={user.id} onChange={(e) => onUserChange(utilisateurs.find((u) => u.id === e.target.value))}
        style={{ ...fontBody, backgroundColor: tokens.bgAlt, color: tokens.ink, borderColor: tokens.border }}
        className="border text-sm rounded-lg px-3 py-1.5">
        {utilisateurs.map((u) => <option key={u.id} value={u.id}>{u.nom} · {u.libelle}</option>)}
      </select>
    </header>
  );
}

function Sidebar({ view, setView, isMobile, isOpen, onClose, alertCount }) {
  const items = [
    { id: 'home', label: 'Accueil', icon: 'home' },
    { id: 'catalog', label: 'Catalogue vins', icon: 'wine' },
    { id: 'suppliers', label: 'Mercuriales', icon: 'truck' },
    { id: 'cards', label: 'Cartes', icon: 'file' },
    { id: 'alerts', label: 'Alertes', icon: 'bell', badge: alertCount },
  ];
  const content = (
    <nav className="flex flex-col gap-1 p-4">
      {items.map((item) => {
        const active = view === item.id;
        return (
          <button key={item.id} onClick={() => { setView(item.id); if (isMobile) onClose(); }}
            style={{ ...fontBody, backgroundColor: active ? tokens.ink : 'transparent', color: active ? tokens.bg : tokens.ink }}
            className="flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">

function CatalogPage({ produits, fournisseurs, user, onEditProduit, onAddProduit }) {

  const [showFilters, setShowFilters] = useState(false);
  const regions = useMemo(() => [...new Set(produits.map((p) => p.region).filter(Boolean))].sort(), [produits]);
  const filtered = useMemo(() => produits.filter((p) => {
    if (search) {
      const s = search.toLowerCase();

      if (!searchable.includes(s)) return false;

    if (fService && p.service !== fService) return false;

  const [collapsed, setCollapsed] = useState({});
  const etab = etablissements.find((e) => e.id === carte.etablissementId);
  const canEdit = user.role !== 'lecteur';
  const tva = etab?.tva ?? 0.20;
  const sections = useMemo(() => {
    const map = {};
    lignes.forEach((l) => {
      const p = produits.find((pr) => pr.id === l.produitId);
      if (!p) return;
      const key = `${p.service}__${p.couleur}`;
      if (!map[key]) map[key] = { service: p.service, couleur: p.couleur, groupes: {} };
      const groupKey = p.service === 'Au Verre' ? p.format : '_all_';
      if (!map[key].groupes[groupKey]) map[key].groupes[groupKey] = [];
      map[key].groupes[groupKey].push({ ...l, produit: p });
    });
    const orderCouleur = ['Champagne', 'Blanc', 'Rosé', 'Rouge', 'Vin Doux', 'Saké'];
    const orderService = ['Au Verre', 'Bouteille'];
    return Object.values(map).sort((a, b) => {
      const sA = orderService.indexOf(a.service);
      const sB = orderService.indexOf(b.service);
      if (sA !== sB) return sA - sB;
      return orderCouleur.indexOf(a.couleur) - orderCouleur.indexOf(b.couleur);
    });
  }, [lignes, produits]);
  const handleAddProduit = (produit) => {
    setLignes([...lignes, { id: `l${Date.now()}${Math.random().toString(36).slice(2, 6)}`, produitId: produit.id, pvpTtc: null, pvpTtcN1: null }]);
    setShowPicker(false);
  };
  const handleUpdateLigne = (id, field, value) => setLignes(lignes.map((l) => l.id === id ? { ...l, [field]: value } : l));
  const handleRemoveLigne = (id) => setLignes(lignes.filter((l) => l.id !== id));
  const handleSave = () => onSave({ ...carte, lignes, dateModif: Date.now() });
  return (
    <div className="p-4 lg:p-8 max-w-7xl mx-auto">
      <Button variant="ghost" icon="arrowLeft" onClick={onBack} className="mb-4">Retour</Button>
      <div className="flex items-start justify-between flex-wrap gap-3 mb-6">
        <div>
          <h1 style={{ ...fontDisplay, color: tokens.ink }} className="text-2xl lg:text-3xl font-semibold">{etab?.nom} · {carte.annee}</h1>
          <p style={{ ...fontBody, color: tokens.inkSoft }} className="text-sm mt-1 flex items-center gap-2 flex-wrap">
            <Icon name="mapPin" size={12} /> {etab?.lieu} ·
            <Badge variant={carte.statut === 'validee' ? 'validated' : 'draft'}>
              {carte.statut === 'validee' ? '✓ Validée' : 'Brouillon'}
            </Badge>
            <Badge>TVA {(tva * 100).toFixed(tva === 0 ? 0 : 1)}%</Badge>
          </p>
        </div>
        <div className="flex gap-2">
          {canEdit && <Button variant="secondary" icon="save" onClick={handleSave}>Enregistrer</Button>}
          <Button variant="primary" icon="eye" onClick={() => { handleSave(); onPreview(carte.id); }}>Aperçu PDF</Button>
        </div>
      </div>
      {sections.length === 0 ? (
        <Card className="p-12 text-center">
          <div className="flex justify-center mb-3"><Icon name="wine" size={36} style={{ color: tokens.inkFaint }} /></div>
          <p style={{ ...fontBody, color: tokens.inkSoft }} className="mb-4">Cette carte est vide.</p>
          {canEdit && <Button variant="accent" icon="plus" onClick={() => { setPickerSection(null); setShowPicker(true); }}>Ajouter un vin</Button>}
        </Card>
      ) : (
        <div className="space-y-4">
          {sections.map((sec) => {
            const key = `${sec.service}__${sec.couleur}`;
            const isCollapsed = collapsed[key];
            const totalItems = Object.values(sec.groupes).reduce((sum, arr) => sum + arr.length, 0);
            return (
              <Card key={key} className="overflow-hidden">
                <button onClick={() => setCollapsed({ ...collapsed, [key]: !isCollapsed })}
                  className="w-full p-4 flex items-center justify-between hover:bg-black/5 transition-colors">
                  <div className="flex items-center gap-3">
                    <Icon name={isCollapsed ? 'chevronRight' : 'chevronDown'} size={16} />
                    <span style={{ ...fontBody, color: tokens.inkFaint }} className="text-xs uppercase tracking-widest">{sec.service}</span>
                    <span style={{ ...fontDisplay, color: tokens.ink }} className="font-semibold">{sec.couleur}</span>
                    <Badge>{totalItems}</Badge>
                  </div>
                </button>
                {!isCollapsed && (
                  <div style={{ borderColor: tokens.border }} className="border-t">
                    {sec.service === 'Au Verre' ? (
                      FORMATS_VERRE.filter((f) => sec.groupes[f]?.length > 0).map((fmt) => (
                        <div key={fmt}>
                          <div style={{ backgroundColor: tokens.bgAlt, borderColor: tokens.border }} className="px-4 py-2 border-b">
                            <span style={{ ...fontBody, color: tokens.inkSoft }} className="text-xs uppercase tracking-wider font-semibold">Format {fmt}</span>
                          </div>
                          {sec.groupes[fmt].map((item) => (
                            <LigneRow key={item.id} ligne={item} canEdit={canEdit} tva={tva}
                              onUpdate={(f, v) => handleUpdateLigne(item.id, f, v)}
                              onRemove={() => handleRemoveLigne(item.id)}
                              onEditProduit={() => onEditProduit(item.produit)} />
                          ))}
                        </div>
                      ))
                    ) : (
                      (sec.groupes['_all_'] || []).map((item) => (
                        <LigneRow key={item.id} ligne={item} canEdit={canEdit} tva={tva}
                          onUpdate={(f, v) => handleUpdateLigne(item.id, f, v)}
                          onRemove={() => handleRemoveLigne(item.id)}
                          onEditProduit={() => onEditProduit(item.produit)} />
                      ))
                    )}
                    {canEdit && (
                      <div className="p-3" style={{ borderTop: `1px solid ${tokens.border}` }}>
                        <Button variant="ghost" icon="plus" onClick={() => { setPickerSection(sec); setShowPicker(true); }}>
                          Ajouter dans {sec.couleur} ({sec.service})
                        </Button>
                      </div>
                    )}
                  </div>
                )}
              </Card>
            );
          })}
          {canEdit && (
            <div className="pt-2">
              <Button variant="accent" icon="plus" onClick={() => { setPickerSection(null); setShowPicker(true); }}>
                Ajouter un vin (autre section)
              </Button>
            </div>
          )}
        </div>
      )}
      {showPicker && (
        <ProduitPicker produits={produits} onSelect={handleAddProduit} onClose={() => setShowPicker(false)}
          preFilter={pickerSection} alreadyAdded={lignes.map((l) => l.produitId)} />
      )}
    </div>
  );
}

// ==================== APERÇU / PDF ====================
function LigneCarte({ item }) {
  const p = item.produit;
  const { ligne1, ligne2 } = formatNomProduit(p);
  return (
    <div className="flex items-baseline gap-3 text-sm lg:text-base">
      <div className="flex-1">
        <div style={{ ...fontDisplay, color: tokens.ink }} className="font-semibold">{ligne1}</div>
        {ligne2 && <div style={{ ...fontBody, color: tokens.inkSoft }} className="text-sm">{ligne2}{p.millesime && ` — ${p.millesime}`}</div>}
        {!ligne2 && p.millesime && <div style={{ ...fontBody, color: tokens.inkSoft }} className="text-sm">{p.millesime}</div>}
        <div style={{ ...fontBody, color: tokens.inkFaint }} className="text-xs mt-0.5">{p.format}</div>
      </div>
      <div className="flex-shrink-0 border-b border-dashed self-end flex-1 mx-2 mb-1" style={{ borderColor: tokens.inkFaint }} />
      <div style={{ ...fontDisplay, color: tokens.ink }} className="font-semibold text-lg">{item.pvpTtc ? formatEuro(item.pvpTtc) : '—'}</div>
    </div>
  );
}

function PreviewPage({ carte, produits, etablissements, onBack }) {
  const etab = etablissements.find((e) => e.id === carte.etablissementId);
  const sections = useMemo(() => {
    const map = {};
    (carte.lignes || []).forEach((l) => {
      const p = produits.find((pr) => pr.id === l.produitId);
      if (!p) return;
      const key = `${p.service}__${p.couleur}`;
      if (!map[key]) map[key] = { service: p.service, couleur: p.couleur, groupes: {} };
      const groupKey = p.service === 'Au Verre' ? p.format : '_all_';
      if (!map[key].groupes[groupKey]) map[key].groupes[groupKey] = [];
      map[key].groupes[groupKey].push({ ...l, produit: p });
    });
    const orderCouleur = ['Champagne', 'Blanc', 'Rosé', 'Rouge', 'Vin Doux', 'Saké'];
    const orderService = ['Au Verre', 'Bouteille'];
    const result = Object.values(map).sort((a, b) => {
      const sA = orderService.indexOf(a.service);
      const sB = orderService.indexOf(b.service);
      if (sA !== sB) return sA - sB;
      return orderCouleur.indexOf(a.couleur) - orderCouleur.indexOf(b.couleur);
    });
    result.forEach((sec) => Object.keys(sec.groupes).forEach((g) => sec.groupes[g].sort((a, b) => (a.pvpTtc || 0) - (b.pvpTtc || 0))));
    return result;
  }, [carte, produits]);

  const handleCopy = () => {
    let text = `CARTE DES VINS — ${etab?.nom} · ${etab?.lieu} · ${carte.annee}\n\n`;
    sections.forEach((sec) => {
      text += `\n=== ${sec.service.toUpperCase()} — ${sec.couleur.toUpperCase()} ===\n`;
      const groupKeys = sec.service === 'Au Verre' ? FORMATS_VERRE.filter((f) => sec.groupes[f]) : ['_all_'];
      groupKeys.forEach((gk) => {
        if (sec.service === 'Au Verre') text += `\n-- ${gk} --\n`;
        text += '\n';
        (sec.groupes[gk] || []).forEach((item) => {
          const p = item.produit;
          const { ligne1, ligne2 } = formatNomProduit(p);
          text += `${ligne1}\n`;
          if (ligne2) text += `${ligne2}`;
          if (p.millesime) text += ` — ${p.millesime}`;
          text += `\n${p.format} — ${formatEuro(item.pvpTtc)}\n\n`;
        });
      });
    });
    navigator.clipboard.writeText(text);
    alert('Données copiées pour Lou');
  };

  return (
    <div style={{ backgroundColor: tokens.bg }} className="min-h-screen">
      <div className="no-print p-4 lg:p-8 max-w-5xl mx-auto">
        <div className="flex items-center justify-between flex-wrap gap-3 mb-6">
          <Button variant="ghost" icon="arrowLeft" onClick={onBack}>Retour éditeur</Button>
          <div className="flex gap-2">
            <Button variant="secondary" icon="copy" onClick={handleCopy}>Copier pour graphiste</Button>
            <Button variant="primary" icon="printer" onClick={() => window.print()}>Imprimer / PDF</Button>
          </div>
        </div>
      </div>
      <div className="printable max-w-4xl mx-auto px-6 lg:px-12 pb-16" style={{ backgroundColor: tokens.bgCard }}>
        <div className="text-center py-10 border-b" style={{ borderColor: tokens.border }}>
          <div style={{ ...fontBody, color: tokens.inkFaint }} className="text-xs uppercase tracking-[0.3em] mb-2">Indie Group</div>
          <h1 style={{ ...fontDisplay, color: tokens.ink }} className="text-4xl lg:text-5xl font-semibold">Carte des Vins</h1>
          <div style={{ ...fontBody, color: tokens.inkSoft }} className="mt-3 text-sm">{etab?.nom} · {etab?.lieu} · {carte.annee}</div>
        </div>
        {sections.length === 0 ? (
          <p className="text-center py-16" style={{ ...fontBody, color: tokens.inkFaint }}>Cette carte est vide.</p>
        ) : (
          sections.map((sec) => (
            <section key={`${sec.service}__${sec.couleur}`} className="py-8">
              <div className="text-center mb-6">
                <div style={{ ...fontBody, color: tokens.inkFaint }} className="text-[10px] uppercase tracking-[0.3em]">{sec.service}</div>
                <h2 style={{ ...fontDisplay, color: tokens.ink }} className="text-2xl lg:text-3xl font-semibold mt-1">{sec.couleur}s</h2>
              </div>
              {sec.service === 'Au Verre' ? (
                FORMATS_VERRE.filter((f) => sec.groupes[f]?.length > 0).map((fmt) => (
                  <div key={fmt} className="mb-6">
                    <div className="text-center mb-3">
                      <span style={{ ...fontBody, color: tokens.inkSoft }} className="text-[10px] uppercase tracking-[0.2em]">Format {fmt}</span>
                    </div>
                    <div className="space-y-5">
                      {sec.groupes[fmt].map((item) => <LigneCarte key={item.id} item={item} />)}
                    </div>
                  </div>
                ))
              ) : (
                <div className="space-y-5">
                  {(sec.groupes['_all_'] || []).map((item) => <LigneCarte key={item.id} item={item} />)}
                </div>
              )}
            </section>
          ))
        )}
      </div>
    </div>
  );
}

function AlertsPage({ alertes, user, onMarkRead, onApproveCreation }) {
  if (user.role !== 'admin') {
    return (
      <div className="p-8 text-center">
        <div className="flex justify-center mb-3"><Icon name="bell" size={32} style={{ color: tokens.inkFaint }} /></div>
        <p style={{ ...fontBody, color: tokens.inkSoft }}>Réservé aux admins.</p>
      </div>
    );
  }
  return (
    <div className="p-4 lg:p-8 max-w-4xl mx-auto">
      <h1 style={{ ...fontDisplay, color: tokens.ink }} className="text-2xl lg:text-3xl font-semibold mb-6">Alertes</h1>
      {alertes.length === 0 ? (
        <Card className="p-8 text-center">
          <div className="flex justify-center mb-3"><Icon name="checkCircle" size={32} style={{ color: tokens.green }} /></div>
          <p style={{ ...fontBody, color: tokens.inkSoft }}>Aucune alerte.</p>
        </Card>
      ) : (
        <div className="space-y-2">
          {alertes.map((a) => (
            <Card key={a.id} className="p-4 flex items-start gap-3">
              <div className={`mt-0.5 w-2 h-2 rounded-full flex-shrink-0 ${a.lue ? 'bg-gray-300' : 'bg-red-500'}`} />
              <div className="flex-1">
                <p style={{ ...fontBody, color: tokens.ink }} className="text-sm font-medium">{a.message}</p>
                <p style={{ ...fontBody, color: tokens.inkFaint }} className="text-xs mt-1">{new Date(a.date).toLocaleString('fr-FR')} · par {a.auteur}</p>
                {a.type === 'nouveau_produit' && !a.lue && a.data && (
                  <div className="mt-2 flex gap-2">
                    <Button variant="accent" icon="check" size="sm" onClick={() => onApproveCreation(a)}>Approuver</Button>
                    <Button variant="ghost" size="sm" onClick={() => onMarkRead(a.id)}>Rejeter</Button>
                  </div>
                )}
              </div>
              {a.type !== 'nouveau_produit' && !a.lue && (
                <Button variant="ghost" size="sm" onClick={() => onMarkRead(a.id)}>Marquer lu</Button>
              )}
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

// ==================== APP PRINCIPAL ====================
function App() {
  const [view, setView] = useState('home');
  const [user, setUser] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [produits, setProduits] = useState([]);
  const [fournisseurs, setFournisseurs] = useState([]);
  const [utilisateurs, setUtilisateurs] = useState([]);
  const [cartes, setCartes] = useState([]);
  const [alertes, setAlertes] = useState([]);
  const [etablissements, setEtablissements] = useState([]);
  const [currentCardId, setCurrentCardId] = useState(null);
  const [editingProduit, setEditingProduit] = useState(null);
  const [isCreatingProduit, setIsCreatingProduit] = useState(false);
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState(null);
  const [dataVersion, setDataVersion] = useState(null);

  // Chargement initial : d'abord produits.json, puis merge avec localStorage
  useEffect(() => {
    (async () => {
      try {
        const response = await fetch('./produits.json?t=' + Date.now());
        if (!response.ok) throw new Error('Impossible de charger produits.json');
        const data = await response.json();

        // Versioning : si le JSON a une nouvelle version, on écrase le catalogue local
        // (mais on garde les cartes et alertes de l'utilisateur)
        const dv = data.version || '1.0';
        setDataVersion(dv);
        const storedVersion = storage.get('ctm:version');
        const versionChanged = storedVersion !== dv;
        if (versionChanged) {
          console.log(`CTM: catalogue mis à jour (${storedVersion || 'aucun'} → ${dv})`);
          storage.set('ctm:version', dv);
        }

        const localProduits = versionChanged ? null : storage.get('ctm:produits');
        const localFournisseurs = versionChanged ? null : storage.get('ctm:fournisseurs');
        const localCartes = storage.get('ctm:cartes');
        const localAlertes = storage.get('ctm:alertes');
        setEtablissements(data.etablissements || []);
        setUtilisateurs(data.utilisateurs || []);
        setProduits(localProduits || data.produits || []);
        setFournisseurs(localFournisseurs || data.fournisseurs || []);
        setCartes(localCartes || []);
        setAlertes(localAlertes || []);
        setUser((data.utilisateurs || [])[0] || null);
      } catch (e) {
        setLoadError(e.message);
      }
      setLoading(false);
    })();
  }, []);

  // Persistance
  useEffect(() => {
    if (loading) return;
    storage.set('ctm:produits', produits);
    storage.set('ctm:fournisseurs', fournisseurs);
    storage.set('ctm:cartes', cartes);
    storage.set('ctm:alertes', alertes);
  }, [produits, fournisseurs, cartes, alertes, loading]);

  const handleCreateCard = (etablissementId) => {
    const newCarte = {
      id: `c${Date.now()}`,
      etablissementId: etablissementId || etablissements[0]?.id,
      annee: 2026, statut: 'brouillon', lignes: [],
      dateModif: Date.now(), auteur: user.nom,
    };
    setCartes([...cartes, newCarte]);
    setCurrentCardId(newCarte.id);
    setView('editor');
  };

  const handleSaveProduit = (produit) => {
    const exists = produits.find((p) => p.id === produit.id);
    if (exists) setProduits(produits.map((p) => p.id === produit.id ? produit : p));
    else {
      setProduits([...produits, produit]);
      if (produit.fournisseur && !fournisseurs.includes(produit.fournisseur)) {
        setFournisseurs([...fournisseurs, produit.fournisseur].sort());
      }
    }
    setEditingProduit(null);
    setIsCreatingProduit(false);
  };

  const handleRequestCreation = (produit) => {
    const alerte = {
      id: `a${Date.now()}`, type: 'nouveau_produit',
      message: `${user.nom} demande l'ajout de "${produit.appellation} — ${produit.domaine}" au catalogue`,
      date: Date.now(), auteur: user.nom, lue: false, data: produit,
    };
    setAlertes([alerte, ...alertes]);
    setEditingProduit(null);
    setIsCreatingProduit(false);
    alert('Demande envoyée à Victor pour validation.');
  };

  const handleApproveCreation = (alerte) => {
    if (alerte.data) {
      setProduits([...produits, alerte.data]);
      if (alerte.data.fournisseur && !fournisseurs.includes(alerte.data.fournisseur)) {
        setFournisseurs([...fournisseurs, alerte.data.fournisseur].sort());
      }
    }
    setAlertes(alertes.map((a) => a.id === alerte.id ? { ...a, lue: true } : a));
  };

  const alertCount = alertes.filter((a) => !a.lue).length;

  if (loading) {
    return (
      <div style={{ backgroundColor: tokens.bg }} className="min-h-screen flex items-center justify-center">
        <div style={{ ...fontDisplay, color: tokens.inkSoft }} className="text-lg">Chargement…</div>
      </div>
    );
  }
  if (loadError || !user) {
    return (
      <div style={{ backgroundColor: tokens.bg }} className="min-h-screen flex items-center justify-center p-6 text-center">
        <div>
          <div style={{ ...fontDisplay, color: tokens.red }} className="text-xl font-semibold mb-2">Erreur de chargement</div>
          <p style={{ ...fontBody, color: tokens.inkSoft }} className="text-sm">
            {loadError || "Aucun utilisateur trouvé dans produits.json"}
          </p>
          <p style={{ ...fontBody, color: tokens.inkFaint }} className="text-xs mt-4">
            Vérifie que le fichier produits.json est bien à la racine du site et que le JSON est valide.
          </p>
        </div>
      </div>
    );
  }

  const currentCard = cartes.find((c) => c.id === currentCardId);

  return (
    <div style={{ backgroundColor: tokens.bg, minHeight: '100vh', ...fontBody }} className="flex flex-col">
      <Header user={user} onUserChange={setUser} onToggleSidebar={() => setSidebarOpen(true)} utilisateurs={utilisateurs} />
      <div className="flex flex-1">
        <Sidebar view={view} setView={setView} isMobile={false} isOpen={false} onClose={() => {}} alertCount={alertCount} />
        <Sidebar view={view} setView={setView} isMobile={true} isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} alertCount={alertCount} />
        <main className="flex-1 overflow-x-hidden">
          {view === 'home' && <HomePage user={user} produits={produits} cartes={cartes} alertes={alertes} etablissements={etablissements}
            onOpenCard={(id) => { setCurrentCardId(id); setView('editor'); }} onCreateCard={handleCreateCard} />}
          {view === 'catalog' && <CatalogPage produits={produits} fournisseurs={fournisseurs} user={user}
            onEditProduit={setEditingProduit} onAddProduit={() => setIsCreatingProduit(true)} />}
          {view === 'suppliers' && <SuppliersPage produits={produits} fournisseurs={fournisseurs} user={user} onEditProduit={setEditingProduit} />}
          {view === 'cards' && <CardsPage cartes={cartes} etablissements={etablissements} user={user}
            onOpenCard={(id) => { setCurrentCardId(id); setView('editor'); }} onCreateCard={handleCreateCard} />}
          {view === 'alerts' && <AlertsPage alertes={alertes} user={user}
            onMarkRead={(id) => setAlertes(alertes.map((a) => a.id === id ? { ...a, lue: true } : a))}
            onApproveCreation={handleApproveCreation} />}
          {view === 'editor' && currentCard && <CardEditor carte={currentCard} produits={produits} etablissements={etablissements} user={user}
            onBack={() => setView('cards')}
            onSave={(updated) => setCartes(cartes.map((c) => c.id === updated.id ? updated : c))}
            onPreview={(id) => { setCurrentCardId(id); setView('preview'); }}
            onEditProduit={setEditingProduit} />}
          {view === 'preview' && currentCard && <PreviewPage carte={currentCard} produits={produits} etablissements={etablissements}
            onBack={() => setView('editor')} />}
        </main>
      </div>
      {(editingProduit || isCreatingProduit) && (
        <ProduitEditModal produit={editingProduit} fournisseurs={fournisseurs} user={user}
          onSave={handleSaveProduit} onRequestCreation={handleRequestCreation}
          onClose={() => { setEditingProduit(null); setIsCreatingProduit(false); }} />
      )}

      {/* Badge de version en bas à gauche */}
      <div className="no-print" style={{
        position: 'fixed', bottom: 8, left: 8, zIndex: 20,
        ...fontBody, color: tokens.inkFaint, fontSize: 10,
        letterSpacing: '0.05em', pointerEvents: 'none',
        textTransform: 'uppercase',
      }}>
        CTM v{APP_VERSION}{dataVersion ? ` · Cat. v${dataVersion}` : ''}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
